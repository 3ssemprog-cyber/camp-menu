<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنيو</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --warm: #f2ebe0;
    --brown: #3d2b1f;
    --brown2: #6b4c38;
    --gold: #b8893a;
    --gold2: #d4a85a;
    --text: #2c1f14;
    --text2: #7a5c44;
    --border: rgba(90,60,30,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    background: var(--brown);
    color: var(--cream);
    text-align: center;
    padding: 3rem 1.5rem 2rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(184,137,58,0.25) 0%, transparent 65%);
  }
  .hero-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 0.75rem;
    position: relative;
  }
  .hero h1 {
    font-family: 'Tajawal', sans-serif;
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 6px;
    position: relative;
    margin-bottom: 0;
    text-transform: uppercase;
    color: #fff;
  }
  .hero-sub {
    font-size: 1rem;
    color: var(--gold2);
    position: relative;
    font-weight: 700;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .hero-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 1.5rem;
    position: relative;
  }
  .hero-divider::before, .hero-divider::after {
    content: '';
    flex: 1;
    max-width: 80px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .hero-divider::after { background: linear-gradient(to left, transparent, var(--gold)); }
  .hero-divider span { color: var(--gold); font-size: 1rem; }

  /* STICKY CATS */
  .cats-sticky {
    position: sticky;
    top: 0;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    z-index: 50;
    padding: 0.75rem 1rem;
    overflow-x: auto;
    scrollbar-width: none;
    display: flex;
    gap: 8px;
    white-space: nowrap;
  }
  .cats-sticky::-webkit-scrollbar { display: none; }
  .cat-pill {
    display: inline-block;
    padding: 0.4rem 1.1rem;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    color: var(--text2);
    font-size: 0.85rem;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    background: transparent;
    white-space: nowrap;
    transition: all 0.25s;
    flex-shrink: 0;
  }
  .cat-pill.active {
    background: var(--brown);
    color: var(--cream);
    border-color: var(--brown);
    font-weight: 700;
  }

  /* MAIN */
  .menu-main { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* SECTION */
  .menu-section { margin-bottom: 2.5rem; }
  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1.5px solid var(--border);
  }
  .section-title h2 {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--brown2);
    letter-spacing: 0.5px;
  }
  .section-title .line { flex: 1; height: 1px; background: var(--border); }

  /* ITEM CARD */
  .item-card {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .item-card:last-child { border-bottom: none; }
  .item-thumb {
    width: 72px;
    height: 72px;
    border-radius: 12px;
    object-fit: cover;
    background: var(--warm);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .item-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .item-body { flex: 1; min-width: 0; }
  .item-name-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
  .item-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }
  .item-price-tag {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
    padding-top: 1px;
  }
  .item-desc {
    font-size: 0.83rem;
    color: var(--text2);
    line-height: 1.5;
    font-weight: 300;
  }
  .badge-unavail {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    background: #f5e8e8;
    color: #b0392a;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
    margin-top: 5px;
    border: 1px solid #e8bfbb;
  }

  /* LOADER */
  .loader {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text2);
  }
  .coffee-anim {
    font-size: 2.5rem;
    animation: steam 1.5s ease-in-out infinite alternate;
    display: block;
    margin-bottom: 1rem;
  }
  @keyframes steam {
    from { transform: translateY(0); }
    to { transform: translateY(-6px); }
  }

  /* EMPTY */
  .empty { text-align: center; padding: 3rem; color: var(--text2); }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.78rem;
    color: var(--text2);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 480px) {
    .hero h1 { font-size: 1.8rem; }
    .item-thumb { width: 60px; height: 60px; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <span class="hero-icon">☕</span>
  <h1 id="cafe-name">CAMP</h1>
  <p class="hero-sub" id="cafe-sub">GAME ZONE</p>
  <div class="hero-divider"><span>✦</span></div>
</div>

<!-- CATS NAV -->
<div class="cats-sticky" id="cats-nav"></div>

<!-- MENU CONTENT -->
<div class="menu-main" id="menu-main">
  <div class="loader">
    <span class="coffee-anim">☕</span>
    <div>جاري تجهيز المنيو...</div>
  </div>
</div>

<div class="footer">جميع الأسعار تشمل الضريبة</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===================== CONFIG =====================
const CAFE_NAME   = "CAMP";
const CAFE_TAGLINE = "GAME ZONE";
// ==================================================

document.getElementById('cafe-name').textContent = CAFE_NAME;
document.getElementById('cafe-sub').textContent = CAFE_TAGLINE;

let allItems = [];
let currentCat = 'الكل';

const q = query(collection(db, "menuItems"), orderBy("category"));
onSnapshot(q, (snap) => {
  allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  buildCats();
  renderMenu();
});

function buildCats() {
  const cats = ['الكل', ...new Set(allItems.map(i => i.category).filter(Boolean))];
  const nav = document.getElementById('cats-nav');
  nav.innerHTML = cats.map(c =>
    `<button class="cat-pill ${c === currentCat ? 'active' : ''}" onclick="scrollToSection('${c}', this)">${c}</button>`
  ).join('');
}

window.scrollToSection = (cat, el) => {
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  if (cat === 'الكل') {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  const section = document.getElementById('section-' + cat);
  if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

function renderMenu() {
  const main = document.getElementById('menu-main');
  const available = allItems.filter(i => i.available !== false);

  if (!available.length) {
    main.innerHTML = '<div class="empty">☕<br><br>المنيو فاضي حالياً<br>ارجع تاني قريباً</div>';
    return;
  }

  const cats = [...new Set(available.map(i => i.category).filter(Boolean))];

  main.innerHTML = cats.map(cat => {
    const items = available.filter(i => i.category === cat);
    return `
      <div class="menu-section" id="section-${cat}">
        <div class="section-title">
          <h2>${cat}</h2>
          <div class="line"></div>
        </div>
        ${items.map(item => `
          <div class="item-card">
            <div class="item-thumb">
              ${item.imageUrl
                ? `<img src="${item.imageUrl}" alt="${item.name}" onerror="this.parentElement.textContent='☕'">`
                : '☕'}
            </div>
            <div class="item-body">
              <div class="item-name-row">
                <span class="item-name">${item.name}</span>
                <span class="item-price-tag">${item.price} ج.م</span>
              </div>
              ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
