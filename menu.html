<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنيو</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --warm: #f2ebe0;
    --brown: #3d2b1f;
    --brown2: #6b4c38;
    --gold: #b8893a;
    --gold2: #d4a85a;
    --text: #2c1f14;
    --text2: #7a5c44;
    --border: rgba(90,60,30,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Tajawal', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* HERO */
  .hero { background: var(--brown); color: var(--cream); text-align: center; padding: 2.5rem 1.5rem 1.8rem; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 120%, rgba(184,137,58,0.25) 0%, transparent 65%); }
  .hero-icon { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; position: relative; }
  .hero h1 { font-size: 2.6rem; font-weight: 900; letter-spacing: 6px; position: relative; margin-bottom: 0; text-transform: uppercase; color: #fff; }
  .hero-sub { font-size: 0.9rem; color: var(--gold2); position: relative; font-weight: 700; letter-spacing: 8px; text-transform: uppercase; margin-top: 2px; }
  .hero-divider { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 1.2rem; position: relative; }
  .hero-divider::before, .hero-divider::after { content: ''; flex: 1; max-width: 80px; height: 1px; background: linear-gradient(to right, transparent, var(--gold)); }
  .hero-divider::after { background: linear-gradient(to left, transparent, var(--gold)); }
  .hero-divider span { color: var(--gold); font-size: 1rem; }

  /* CATEGORIES SCREEN */
  #cats-screen { display: block; }
  .cats-screen-inner { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .cats-screen-title { font-size: 0.85rem; color: var(--text2); text-align: center; margin-bottom: 1.2rem; letter-spacing: 1px; }
  .cats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cat-card {
    background: var(--brown);
    border-radius: 20px;
    padding: 1.5rem 1rem 1.3rem;
    text-align: center;
    cursor: pointer;
    transition: transform 0.18s, background 0.18s;
    border: 1.5px solid transparent;
  }
  .cat-card:active { transform: scale(0.95); }
  .cat-card:hover { background: var(--brown2); border-color: var(--gold); }
  .cat-card-icon { font-size: 2.2rem; margin-bottom: 0.5rem; display: block; }
  .cat-card-name { font-size: 1rem; font-weight: 700; color: var(--cream); }
  .cat-card-count { font-size: 0.78rem; color: var(--gold2); margin-top: 4px; }

  /* ITEMS SCREEN */
  #items-screen { display: none; }
  .items-topbar {
    background: var(--brown);
    padding: 0.85rem 1rem;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .back-btn {
    background: rgba(255,255,255,0.12);
    border: none;
    color: var(--cream);
    font-size: 1.1rem;
    cursor: pointer;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
    font-family: 'Tajawal', sans-serif;
  }
  .back-btn:hover { background: rgba(255,255,255,0.22); }
  .items-topbar-title { font-size: 1.1rem; font-weight: 700; color: var(--cream); }

  .items-inner { max-width: 480px; margin: 0 auto; padding: 1.2rem 1rem 4rem; }

  /* GRID */
  .items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .item-card { background: var(--brown); border-radius: 16px; overflow: hidden; transition: transform 0.18s; }
  .item-card:active { transform: scale(0.97); }
  .item-img-wrap { width: 100%; height: 120px; background: var(--brown2); display: flex; align-items: center; justify-content: center; font-size: 2.8rem; overflow: hidden; }
  .item-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .item-body { padding: 10px 10px 12px; }
  .item-name { font-size: 0.9rem; font-weight: 700; color: var(--cream); line-height: 1.3; margin-bottom: 3px; }
  .item-desc { font-size: 0.75rem; color: rgba(250,246,240,0.55); line-height: 1.4; margin-bottom: 6px; font-weight: 300; }
  .item-price-tag { font-size: 0.95rem; font-weight: 700; color: var(--gold2); }

  /* LOADER / EMPTY */
  .loader { text-align: center; padding: 4rem 1rem; color: var(--text2); }
  .coffee-anim { font-size: 2.5rem; animation: steam 1.5s ease-in-out infinite alternate; display: block; margin-bottom: 1rem; }
  @keyframes steam { from { transform: translateY(0); } to { transform: translateY(-6px); } }
  .empty { text-align: center; padding: 3rem; color: var(--text2); }

  .footer { text-align: center; padding: 1.5rem; font-size: 0.78rem; color: var(--text2); border-top: 1px solid var(--border); }

  @media (max-width: 360px) { .hero h1 { font-size: 2rem; } }
</style>
</head>
<body>

<div class="hero">
  <span class="hero-icon">☕</span>
  <h1>CAMP</h1>
  <p class="hero-sub">GAME ZONE</p>
  <div class="hero-divider"><span>✦</span></div>
</div>

<!-- شاشة اختيار التصنيف -->
<div id="cats-screen">
  <div class="cats-screen-inner">
    <div class="cats-screen-title">اختر التصنيف</div>
    <div class="cats-grid" id="cats-grid">
      <div class="loader"><span class="coffee-anim">☕</span><div>جاري التحميل...</div></div>
    </div>
  </div>
</div>

<!-- شاشة الأيتم -->
<div id="items-screen">
  <div class="items-topbar">
    <button class="back-btn" id="back-btn">&#8594;</button>
    <span class="items-topbar-title" id="items-title"></span>
  </div>
  <div class="items-inner">
    <div class="items-grid" id="items-grid"></div>
  </div>
</div>

<div class="footer" id="footer">جميع الأسعار تشمل الضريبة</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const CATEGORY_ICONS = {
  'قهوة ساخنة': '☕', 'قهوة باردة': '🧋', 'مشروبات باردة': '🥤',
  'شاي وأعشاب': '🍵', 'عصائر': '🍹', 'حلويات': '🍰',
  'وجبات خفيفة': '🥪', 'ايس كريم': '🍦', 'شيشة': '💨',
};
function getIcon(cat) { return CATEGORY_ICONS[cat] || '🍽️'; }

let allItems = [];

const q = query(collection(db, "menuItems"), orderBy("category"));
onSnapshot(q, (snap) => {
  allItems = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(i => i.available !== false);
  renderCatsScreen();
});

function renderCatsScreen() {
  const grid = document.getElementById('cats-grid');
  const cats = [...new Set(allItems.map(i => i.category).filter(Boolean))];
  if (!cats.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">المنيو فاضي حالياً</div>';
    return;
  }
  grid.innerHTML = cats.map(cat => {
    const count = allItems.filter(i => i.category === cat).length;
    return `
      <div class="cat-card" onclick="openCategory('${cat}')">
        <span class="cat-card-icon">${getIcon(cat)}</span>
        <div class="cat-card-name">${cat}</div>
        <div class="cat-card-count">${count} صنف</div>
      </div>
    `;
  }).join('');
}

window.openCategory = (cat) => {
  const items = allItems.filter(i => i.category === cat);
  document.getElementById('items-title').textContent = cat;
  document.getElementById('items-grid').innerHTML = items.map(item => `
    <div class="item-card">
      <div class="item-img-wrap">
        ${item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.name}" onerror="this.parentElement.textContent='${getIcon(cat)}'">` : getIcon(cat)}
      </div>
      <div class="item-body">
        <div class="item-name">${item.name}</div>
        ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
        <div class="item-price-tag">${item.price} ج.م</div>
      </div>
    </div>
  `).join('');
  document.getElementById('cats-screen').style.display = 'none';
  document.getElementById('items-screen').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('items-screen').style.display = 'none';
  document.getElementById('cats-screen').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
